<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4;
    --bg2: #ffffff;
    --bg3: #f0ede8;
    --border: #e5e0d8;
    --border2: #d4cdc3;
    --text: #1a1714;
    --text2: #6b6560;
    --text3: #9e9890;
    --accent: #ff6a00;
    --accent2: #e85500;
    --green: #16a34a;
    --red: #dc2626;
    --amber: #f59e0b;
    --purple: #7c3aed;
    --teal: #0d9488;
  }
  body { font-family: 'MaruBuri', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #root { min-height: 100vh; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { background: var(--bg2); border-bottom: 2px solid var(--accent); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .header-logo span { color: var(--accent); }
  .header-nav { display: flex; gap: 4px; }
  .nav-btn { background: none; border: none; color: var(--text2); font-size: 13px; font-family: inherit; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: #fff; }
  .main { flex: 1; padding: 28px 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; font-family: 'MaruBuri', sans-serif; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px 9px 36px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; transition: border 0.15s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before { content: '⌕'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }
  .filter-select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 14px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; cursor: pointer; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); }
  .btn-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .btn-success:hover { background: rgba(34,197,94,0.25); }

  /* TABLE */
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { display: grid; grid-template-columns: 2fr 2fr 1.2fr 1.2fr 1.2fr 80px; padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .table-header span { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .table-header span:hover { color: var(--text2); }
  .table-row { display: grid; grid-template-columns: 2fr 2fr 1.2fr 1.2fr 1.2fr 80px; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; transition: background 0.12s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: #fff5f0; }
  .company-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .company-industry { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; }

function fmt(v) {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return v;
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1) + '조';
  return n.toLocaleString('ko-KR', {maximumFractionDigits:1}) + '억';
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'});
}
function calcChange(curr, prev) {
  if (curr == null || prev == null || prev === 0) return null;
  return ((curr - prev) / Math.abs(prev) * 100).toFixed(1);
}
function getStatusBadge(status) {
  if (!status || status === 'X' || status === '-') return null;
  if (status.includes('완료') || status.includes('진행중')) return <span className="status-badge status-ongoing">{status}</span>;

}

}

// ─── EXCEL UPLOAD ─────────────────────────────────────────
function ExcelUpload({ onClose, onDone }) {
  const [status, setStatus] = useState('idle');
  const [log, setLog] = useState([]);
  const fileRef = useRef();

  async function handleFile(file) {
    setStatus('processing');
    setLog(['파일 읽는 중...']);
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets['마스터DB'];
    if (!ws) { setLog(['❌ "마스터DB" 시트를 찾을 수 없어요']); setStatus('done'); return; }
    const rows = XLSX.utils.sheet_to_json(ws, { defval: null });
    setLog(l => [...l, `${rows.length}개 기업 데이터 발견`]);
    let ok = 0, fail = 0;
    for (const row of rows) {
      const name = row['회사명'];
      if (!name) continue;
      const tags = row['태그'] ? row['태그'].split(',').map(t=>t.trim()) : [];
      const { error } = await supabase.from('companies').upsert({
        name, location: row['소재지'] || null, ceo: row['대표자명'] || null,
        employee_count: String(row['임직원수'] || ''), listing_status: row['상장여부'] || null,
        industry: row['업종'] || null, tags, ma_status: row['M&A 추진 여부 및 진행단계'] || null,
        inbound_outbound: row['아웃바운드 or 인바운드 경로'] || null
      }, { onConflict: 'name' });
      if (error) { fail++; setLog(l => [...l, `❌ ${name}: ${error.message}`]); }
      else { ok++; }
    }
    setLog(l => [...l, `✅ 완료: ${ok}개 성공, ${fail}개 실패`]);
    setStatus('done');
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">엑셀 일괄 업로드</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {status === 'idle' && (
            <>
              <div className="upload-zone" onClick={() => fileRef.current.click()}>
                <div className="upload-icon">📊</div>
                <div className="upload-text">엑셀 파일을 클릭해서 선택하세요</div>
                <div className="upload-sub">"마스터DB" 시트 기준으로 업데이트됩니다</div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
              </div>
              <div style={{marginTop:16,fontSize:12,color:'var(--text3)'}}>
                * 기존 기업은 업데이트, 새 기업은 추가됩니다<br/>
                * 재무실적은 SQL Editor에서 별도 업데이트 권장
              </div>
            </>
          )}
          {(status === 'processing' || status === 'done') && (
            <div style={{background:'var(--bg3)',borderRadius:8,padding:16,fontFamily:'MaruBuri,sans-serif',fontSize:12,color:'var(--text2)',lineHeight:2}}>
              {log.map((l,i) => <div key={i}>{l}</div>)}
              {status === 'processing' && <div style={{color:'var(--accent)'}}>처리 중...</div>}
            </div>
          )}
          <div className="modal-footer" style={{marginTop:16}}>
            {status === 'done' ? <button className="btn btn-primary" onClick={() => {onDone(); onClose();}}>완료</button> : <button className="btn btn-secondary" onClick={onClose}>취소</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function DetailView({ company, onBack }) {

    const [f, v, r] = await Promise.all([
      supabase.from('financials').select('*').eq('company_id', company.id).order('fiscal_date', {ascending:false}),
      supabase.from('valuations').select('*').eq('company_id', company.id).order('valuation_date', {ascending:false}),
      supabase.from('reports').select('*').eq('company_id', company.id).order('report_date', {ascending:false}),
    ]);
    setFinancials(f.data || []);
    setValuations(v.data || []);
    setReports(r.data || []);

  useEffect(() => { load(); }, [load]);

  const showToast = (msg, type='success') => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

    <div>

      {modal === 'valuation' && <ValuationModal company={company} onClose={()=>setModal(null)} onSave={()=>{load();showToast('기업가치가 저장됐어요');}}/>}
      {modal === 'report' && <ReportModal company={company} onClose={()=>setModal(null)} onSave={()=>{load();showToast('보고 이력이 저장됐어요');}}/>}

      <button className="back-btn" onClick={onBack}>← 목록으로</button>

      <div className="detail-header">
        <div>
          <div className="detail-title">{company.name}</div>
          <div className="detail-sub">
            <span>{getListingBadge(company.listing_status)}</span>
            {company.founded_date && <span>📅 {fmtDate(company.founded_date)}</span>}
            <span>👤 {company.ceo || '—'}</span>
            <span>📍 {company.location || '—'}</span>
            <span>🏭 {company.industry || '—'}</span>
            <span>👥 {company.employee_count || '—'}명</span>
          </div>
          <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:4}}>
            {(company.tags||[]).map(t=><span key={t} className="tag sector">{t}</span>)}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-secondary" onClick={()=>setModal('financial')}>+ 재무실적</button>
          <button className="btn btn-secondary" onClick={()=>setModal('valuation')}>+ 기업가치</button>
          <button className="btn btn-secondary" onClick={()=>setModal('report')}>+ 보고 이력</button>
        </div>
      </div>

      <div className="tab-bar">
        {[['overview','개요'],['financials','재무 이력'],['valuations','기업가치 이력'],['review','내부검토 현황']].map(([k,l])=>
          <button key={k} className={`tab ${activeTab===k?'active':''}`} onClick={()=>setActiveTab(k)}>{l}</button>
        )}
      </div>

      {activeTab === 'overview' && (
        <div>
          {/* 기업 기본 정보 표 */}
          <div className="full-width-section" style={{marginBottom:20}}>
            <div className="section-title">기업 기본 정보</div>
            <table className="history-table">
              <tbody>
                <tr>
                  <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text3)',width:'15%'}}>설립일</td>
                  <td style={{textAlign:'left',fontFamily:'inherit'}}>{company.founded_date ? fmtDate(company.founded_date) : '—'}</td>
                  <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text3)',width:'15%'}}>소재지</td>
                  <td style={{textAlign:'left',fontFamily:'inherit'}}>{company.location || '—'}</td>
                </tr>
                <tr>
                  <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text3)'}}>대표이사</td>
                  <td style={{textAlign:'left',fontFamily:'inherit'}}>{company.ceo || '—'}</td>
                  <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text3)'}}>임직원 수</td>
                  <td style={{textAlign:'left',fontFamily:'inherit'}}>{company.employee_count || '—'}명</td>
                </tr>
                <tr>
                  <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text3)'}}>업종</td>
                  <td style={{textAlign:'left',fontFamily:'inherit'}}>{company.industry || '—'}</td>
                  <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text3)'}}>상장여부</td>
                  <td style={{textAlign:'left',fontFamily:'inherit'}}>{getListingBadge(company.listing_status) || '—'}</td>
                </tr>

              </tbody>
            </table>
          </div>

          {/* 재무실적 + 기업가치 */}
          <div className="detail-grid">
            <div className="detail-section">
              <div className="section-title">최신 재무실적</div>
              {latestF ? <>
                <div className="info-row"><span className="info-label">기준일</span><span className="info-value">{fmtDate(latestF.fiscal_date)}</span></div>
                <div className="info-row"><span className="info-label">매출</span><span className="info-value mono">{fmt(latestF.revenue)}</span></div>
                <div className="info-row"><span className="info-label">영업이익</span><span className="info-value mono" style={{color:latestF.operating_profit<0?'var(--red)':' var(--text)'}}>{fmt(latestF.operating_profit)}</span></div>
                <div className="info-row"><span className="info-label">총자산</span><span className="info-value mono">{fmt(latestF.total_assets)}</span></div>
                <div className="info-row"><span className="info-label">순자산</span><span className="info-value mono">{fmt(latestF.net_assets)}</span></div>
                {latestF.memo && <div className="info-row"><span className="info-label">메모</span><span className="info-value" style={{fontSize:12,maxWidth:'60%',textAlign:'right'}}>{latestF.memo}</span></div>}
              </> : <div style={{color:'var(--text3)',fontSize:13}}>재무실적 데이터가 없습니다</div>}
            </div>
            <div className="detail-section">
              <div className="section-title">기업가치</div>
              {latestV ? (() => {
                // 기업가치 기준일 이전 가장 가까운 재무실적 찾기
                const vDate = new Date(latestV.valuation_date);
                const nearestF = financials.reduce((best, f) => {
                  if (!f.operating_profit || f.operating_profit <= 0) return best;
                  const fDate = new Date(f.fiscal_date);
                  if (fDate > vDate) return best;
                  const diff = vDate - fDate;
                  const bestDiff = best ? vDate - new Date(best.fiscal_date) : Infinity;
                  return diff < bestDiff ? f : best;
                }, null);
                const calcPE = nearestF && latestV.valuation && nearestF.operating_profit > 0
                  ? (Number(latestV.valuation) / Number(nearestF.operating_profit)).toFixed(1)
                  : null;
                return <>
                  <div className="info-row"><span className="info-label">기준일</span><span className="info-value">{fmtDate(latestV.valuation_date)}</span></div>
                  <div className="info-row"><span className="info-label">기업가치</span><span className="info-value mono">{fmt(latestV.valuation)}</span></div>
                  <div className="info-row">
                    <span className="info-label">P/E 멀티플</span>
                    <span className="info-value mono">
                      {calcPE ? calcPE + 'x' : <span style={{color:'var(--text3)'}}>N/A</span>}
                    </span>
                  </div>
                  {calcPE && nearestF && <div className="info-row"><span className="info-label" style={{fontSize:11}}>기준 실적</span><span className="info-value" style={{fontSize:11,color:'var(--text3)'}}>{fmtDate(nearestF.fiscal_date)} OP {fmt(nearestF.operating_profit)}</span></div>}
                </>;
              })() : <div style={{color:'var(--text3)',fontSize:13}}>기업가치 데이터가 없습니다</div>}
            </div>
          </div>
        </div>
      )}

      {activeTab === 'financials' && (
        <div className="full-width-section">
          <div className="section-title">재무실적 이력 (누적)</div>
          {financials.length > 0 ? (() => {
            const sorted = [...financials].reverse();
            const revenues = sorted.map(f => Number(f.revenue)||0);
            const ops = sorted.map(f => Number(f.operating_profit)||0);
            const tas = sorted.map(f => Number(f.total_assets)||0);
            const nas = sorted.map(f => Number(f.net_assets)||0);
            const maxPos = Math.max(...revenues, ...ops.filter(v=>v>0), 0);
            const maxNeg = Math.abs(Math.min(...ops.filter(v=>v<0), 0));
            const total = maxPos + maxNeg || 1;
            const maxAsset = Math.max(...tas, ...nas.filter(v=>v>0), 1);

            const MiniChart = ({data, scales, color, color2, xLabels}) => {
              const W = 320; const H = 120; const pad = {l:52,r:10,t:20,b:24};
              const innerW = W-pad.l-pad.r; const innerH = H-pad.t-pad.b;
              const n = data[0].length;
              const colW2 = Math.floor(innerW/n);
              const bW = Math.min(16, Math.floor(colW2/2.8));
              const gap = 3;
              // 각 시리즈별 독립 스케일
              const getScale = (idx) => {
                const vals = data[idx];
                const posMax = Math.max(...vals.filter(v=>v>0), 0);
                const negMax = Math.abs(Math.min(...vals.filter(v=>v<0), 0));
                return { posMax: posMax||1, negMax };
              };
              // 공유 0선 위치: 첫번째 시리즈 기준
              const s0 = scales ? scales[0] : getScale(0);
              const total0 = s0.posMax + s0.negMax;
              const zeroY = pad.t + innerH * (s0.posMax / (total0||1));
              // Y축 눈금 (첫번째 시리즈 기준)
              const absMax0 = s0.posMax;
              const mag = Math.pow(10, Math.floor(Math.log10(absMax0||1)));
              const ti = absMax0 <= mag*2 ? mag : absMax0 <= mag*5 ? mag*2 : mag*5;
              const posTicks = []; for(let v=ti; v<=s0.posMax*1.05; v+=ti) { if(posTicks.length<3) posTicks.push(v); }
              const negTicks2 = []; for(let v=ti; v<=s0.negMax*1.05; v+=ti) { if(negTicks2.length<3) negTicks2.push(v); }
              return (
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
                  {posTicks.map(v => {
                    const y = zeroY - (v/s0.posMax)*(zeroY-pad.t);
                    return <g key={v}>
                      <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3"/>
                      <text x={pad.l-3} y={y+3} textAnchor="end" fontSize="8" fill="var(--text3)" fontFamily="MaruBuri,sans-serif">{fmt(v)}</text>
                    </g>;
                  })}
                  {negTicks2.map(v => {
                    const y = zeroY + (v/(s0.negMax||1))*(H-pad.b-zeroY);
                    return <g key={-v}>
                      <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3"/>
                      <text x={pad.l-3} y={y+3} textAnchor="end" fontSize="8" fill="var(--text3)" fontFamily="MaruBuri,sans-serif">-{fmt(v)}</text>
                    </g>;
                  })}
                  <line x1={pad.l} y1={zeroY} x2={W-pad.r} y2={zeroY} stroke="var(--border2)" strokeWidth="1.2"/>
                  <text x={pad.l-3} y={zeroY+3} textAnchor="end" fontSize="8" fill="var(--text3)" fontFamily="MaruBuri,sans-serif">0</text>
                  {data[0].map((_, i) => {
                    const colX = pad.l + i*colW2 + (colW2-(bW*data.length+gap*(data.length-1)))/2;
                    return data.map((series, si) => {
                      const v = Number(series[i])||0;
                      const sc = scales ? scales[si] : getScale(si);
                      const posH = zeroY - pad.t;
                      const negH = H - pad.b - zeroY;
                      const bH = v >= 0
                        ? Math.max(Math.round((v/(sc.posMax||1))*posH), 2)
                        : Math.max(Math.round((Math.abs(v)/(sc.negMax||1))*negH), 2);
                      const bX = colX + si*(bW+gap);
                      const bY = v >= 0 ? zeroY-bH : zeroY;
                      const cl = si===0 ? color : color2||'rgba(255,106,0,0.38)';
                      return <rect key={si} x={bX} y={bY} width={bW} height={bH} fill={cl} rx="2"/>;
                    });
                  })}
                  {(xLabels||[]).map((lbl,i) => (
                    <text key={i} x={pad.l+i*colW2+colW2/2} y={H-pad.b+12} textAnchor="middle" fontSize="8" fill="var(--text3)" fontFamily="MaruBuri,sans-serif">{lbl}</text>
                  ))}
                </svg>
              );
            };

            return (
              <div style={{display:'flex',flexDirection:'column',gap:20}}>
                {/* 섹션1: 손익 */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,alignItems:'start'}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>손익 현황</div>
                    <table className="history-table" style={{fontSize:12}}>
                      <thead><tr>
                        <th style={{textAlign:'left',fontSize:10}}>결산기준일</th>
                        <th style={{fontSize:10}}>매출</th>
                        <th style={{fontSize:10}}>영업이익</th>
                        <th style={{fontSize:10}}>영업이익률</th>
                      </tr></thead>
                      <tbody>{financials.map((f,i) => {
                        const prev = financials[i+1];
                        const revChg = prev?.revenue ? calcChange(f.revenue, prev.revenue) : null;
                        const opChg = prev?.operating_profit && prev.operating_profit !== 0 ? calcChange(f.operating_profit, prev.operating_profit) : null;
                        const opMargin = f.revenue && f.revenue !== 0 ? ((Number(f.operating_profit)||0) / Number(f.revenue) * 100).toFixed(1) : null;
                        return (
                        <tr key={f.id}>
                          <td style={{textAlign:'left',fontFamily:'MaruBuri,sans-serif',fontSize:11}}>{fmtDate(f.fiscal_date)}</td>
                          <td style={{fontSize:12}}>
                            {fmt(f.revenue)}
                            {revChg && <span style={{fontSize:9,color:Number(revChg)>=0?'var(--green)':'var(--red)',marginLeft:4}}>{Number(revChg)>=0?'▲':'▼'}{Math.abs(revChg)}%</span>}
                          </td>
                          <td style={{fontSize:12}}>
                            <span style={{color:f.operating_profit==null?'var(--text3)':f.operating_profit<0?'var(--red)':'var(--text)'}}>{fmt(f.operating_profit)}</span>
                            {opChg && <span style={{fontSize:9,color:Number(opChg)>=0?'var(--green)':'var(--red)',marginLeft:4}}>{Number(opChg)>=0?'▲':'▼'}{Math.abs(opChg)}%</span>}
                          </td>
                          <td style={{fontSize:12,color:opMargin===null?'var(--text3)':Number(opMargin)<0?'var(--red)':'var(--text)',fontFamily:'MaruBuri,sans-serif'}}>
                            {opMargin !== null ? opMargin + '%' : '—'}
                          </td>
                        </tr>
                        );
                      })}</tbody>
                    </table>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>매출 / 영업이익 추이</div>
                    {(() => {
                      const revScale = { posMax: Math.max(...revenues,1), negMax: 0 };
                      const opPosMax = Math.max(...ops.filter(v=>v>0), 0);
                      const opNegMax = Math.abs(Math.min(...ops.filter(v=>v<0), 0));
                      const opScale = { posMax: opPosMax||opNegMax||1, negMax: opNegMax };
                      // 0선은 revenues 기준, op는 독립 스케일
                      const sharedPosMax = Math.max(revScale.posMax, opPosMax);
                      const sharedNegMax = opNegMax;
                      const s0 = { posMax: sharedPosMax, negMax: sharedNegMax };
                      return <MiniChart
                        data={[revenues, ops]}
                        scales={[s0, s0]}
                        color="var(--accent)" color2="rgba(255,106,0,0.38)"
                        xLabels={sorted.map(f=>new Date(f.fiscal_date).getFullYear())}
                      />;
                    })()}
                    <div style={{display:'flex',gap:14,marginTop:4,fontSize:11,color:'var(--text2)',justifyContent:'center'}}>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'var(--accent)',display:'inline-block'}}/> 매출</span>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'rgba(255,106,0,0.38)',display:'inline-block'}}/> 영업이익</span>
                    </div>
                  </div>
                </div>

                {/* 구분선 */}
                <div style={{borderTop:'1px solid var(--border)'}}/>

                {/* 섹션2: 재무상태 */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,alignItems:'start'}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>재무상태</div>
                    <table className="history-table" style={{fontSize:12}}>
                      <thead><tr>
                        <th style={{textAlign:'left',fontSize:10}}>결산기준일</th>
                        <th style={{fontSize:10}}>총자산</th>
                        <th style={{fontSize:10}}>순자산</th>
                        <th style={{fontSize:10}}>출처</th>
                      </tr></thead>
                      <tbody>{financials.map(f => (
                        <tr key={f.id}>
                          <td style={{textAlign:'left',fontFamily:'MaruBuri,sans-serif',fontSize:11}}>{fmtDate(f.fiscal_date)}</td>
                          <td style={{fontSize:12}}>{fmt(f.total_assets)}</td>
                          <td style={{fontSize:12,color:f.net_assets!=null&&Number(f.net_assets)<0?'var(--red)':'var(--text)'}}>{fmt(f.net_assets)}</td>
                          <td style={{fontFamily:'inherit',fontSize:11,color:'var(--text3)'}}>{f.source||'—'}</td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>총자산 / 순자산 추이</div>
                    {(() => {
                      const taMax = Math.max(...tas, 1);
                      const naPos = Math.max(...nas.filter(v=>v>0), 0);
                      const naNeg = Math.abs(Math.min(...nas.filter(v=>v<0), 0));
                      const assetScale = { posMax: Math.max(taMax, naPos), negMax: naNeg };
                      return <MiniChart
                        data={[tas, nas]}
                        scales={[assetScale, assetScale]}
                        color="var(--accent)" color2="rgba(255,106,0,0.38)"
                        xLabels={sorted.map(f=>new Date(f.fiscal_date).getFullYear())}
                      />;
                    })()}
                    <div style={{display:'flex',gap:14,marginTop:4,fontSize:11,color:'var(--text2)',justifyContent:'center'}}>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'var(--accent)',display:'inline-block'}}/> 총자산</span>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'rgba(255,106,0,0.38)',display:'inline-block'}}/> 순자산</span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })() : <div style={{color:'var(--text3)',fontSize:13}}>데이터가 없습니다</div>}
        </div>
      )}
      {activeTab === 'valuations' && (
        <div className="full-width-section">
          <div className="section-title">기업가치 이력 (누적)</div>
          {valuations.length > 0 ? (() => {
            const sorted = [...valuations].sort((a,b) => new Date(a.valuation_date) - new Date(b.valuation_date));
            const latest = sorted[sorted.length-1];
            const maxVal = Math.max(...sorted.map(v => Number(v.valuation)||0), 1);
            const magnitude = Math.pow(10, Math.floor(Math.log10(maxVal)));
            const ti = maxVal <= magnitude*2 ? magnitude/2 : maxVal <= magnitude*5 ? magnitude : magnitude*2;
            const ticks = [];
            for(let v=ti; v<=maxVal*1.15; v+=ti) ticks.push(v);
            const yAxisW = 52; const chartH = 160; const padT = 20; const padB = 28; const padR = 12;
            const innerH = chartH - padT - padB;
            const colW = Math.max(60, Math.floor((500) / sorted.length));
            const svgW = Math.max(sorted.length * colW + yAxisW + padR, 400);
            const barW = Math.min(32, colW - 16);
            return (
              <div>
                {/* 요약 헤더 */}
                <div style={{display:'flex',gap:32,marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
                  <div>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>최신 기업가치</div>
                    <div style={{fontSize:20,fontWeight:700,fontFamily:'MaruBuri,sans-serif',color:'var(--accent)'}}>{fmt(latest.valuation)}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(latest.valuation_date)} · {latest.memo||'—'}</div>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>기업가치 건수</div>
                    <div style={{fontSize:20,fontWeight:700,fontFamily:'MaruBuri,sans-serif',color:'var(--text)'}}>{sorted.length}건</div>
                  </div>
                  {sorted.length >= 2 && (() => {
                    const first = sorted[0];
                    const chg = calcChange(latest.valuation, first.valuation);
                    return (
                      <div>
                        <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>초기 대비 변화</div>
                        <div style={{fontSize:20,fontWeight:700,fontFamily:'MaruBuri,sans-serif',color:Number(chg)>=0?'var(--green)':'var(--red)'}}>
                          {Number(chg)>=0?'▲':'▼'}{Math.abs(chg)}%
                        </div>
                        <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmt(first.valuation)} → {fmt(latest.valuation)}</div>
                      </div>
                    );
                  })()}
                </div>
                {/* 차트 */}
                <div style={{overflowX:'auto'}}>
                  <svg width="100%" viewBox={`0 0 ${svgW} ${chartH}`} style={{display:'block',minWidth:300}}>
                    {/* Y축 눈금 */}
                    {ticks.map(v => {
                      const y = padT + innerH - Math.round((v/maxVal/1.15)*innerH);
                      return (
                        <g key={v}>
                          <line x1={yAxisW} y1={y} x2={svgW-padR} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3"/>
                          <text x={yAxisW-4} y={y+3} textAnchor="end" fontSize="9" fill="var(--text3)" fontFamily="MaruBuri,sans-serif">{fmt(v)}</text>
                        </g>
                      );
                    })}
                    {/* X축 기준선 */}
                    <line x1={yAxisW} y1={padT+innerH} x2={svgW-padR} y2={padT+innerH} stroke="var(--border2)" strokeWidth="1"/>
                    {/* 막대 */}
                    {sorted.map((v, i) => {
                      const val = Number(v.valuation)||0;
                      const bH = Math.max(Math.round((val/maxVal/1.15)*innerH), 2);
                      const colX = yAxisW + i*colW + (colW-barW)/2;
                      const bY = padT + innerH - bH;
                      const isLatest = i === sorted.length-1;
                      return (
                        <g key={v.id}>
                          <rect x={colX} y={bY} width={barW} height={bH}
                            fill={isLatest ? 'var(--accent)' : 'rgba(255,106,0,0.35)'}
                            rx="3"/>
                          {/* 수치 레이블 */}
                          <text x={colX+barW/2} y={bY-4} textAnchor="middle" fontSize="9" fill="var(--text2)" fontFamily="MaruBuri,sans-serif">{fmt(val)}</text>
                          {/* X축 날짜 */}
                          <text x={colX+barW/2} y={padT+innerH+14} textAnchor="middle" fontSize="8" fill="var(--text3)" fontFamily="MaruBuri,sans-serif">
                            {new Date(v.valuation_date).getFullYear()}.{String(new Date(v.valuation_date).getMonth()+1).padStart(2,'0')}
                          </text>
                          {/* 거래유형 */}
                          {v.memo && <text x={colX+barW/2} y={padT+innerH+24} textAnchor="middle" fontSize="7" fill="var(--text3)" fontFamily="inherit">{v.memo}</text>}
                        </g>
                      );
                    })}
                  </svg>
                </div>
                {/* 상세 테이블 */}
                <div style={{marginTop:20,border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
                  <div style={{display:'grid',gridTemplateColumns:'120px 100px 80px 160px 1fr',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>
                    {['기준일','기업가치','P/E','거래 유형','출처'].map((h,i)=>(
                      <div key={i} style={{padding:'9px 14px',fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:'0.06em',textAlign:'center'}}>{h}</div>
                    ))}
                  </div>
                  {sorted.slice().reverse().map((v,idx)=>{
                    const parts = (v.memo||'').split(' · ');
                    const dealType = parts[0]||'—';
                    const textSource = parts.length>1 ? parts.slice(1).join(' · ') : null;
                    const cs = {padding:'10px 14px',fontSize:12,color:'var(--text)',textAlign:'center'};
                    // 가장 가까운 직전 재무실적으로 P/E 계산
                    const vDate = new Date(v.valuation_date);
                    const nearestF = financials.reduce((best, f) => {
                      if (!f.operating_profit || f.operating_profit <= 0) return best;
                      const fDate = new Date(f.fiscal_date);
                      if (fDate > vDate) return best; // 기준일 이후 실적 제외
                      const diff = vDate - fDate;
                      const bestDiff = best ? vDate - new Date(best.fiscal_date) : Infinity;
                      return diff < bestDiff ? f : best;
                    }, null);
                    const pe = nearestF && v.valuation && nearestF.operating_profit > 0
                      ? (Number(v.valuation) / Number(nearestF.operating_profit)).toFixed(1)
                      : null;
                    return (
                      <div key={v.id} style={{display:'grid',gridTemplateColumns:'120px 100px 80px 160px 1fr',borderBottom:idx<sorted.length-1?'1px solid var(--border)':'none',background:'var(--bg2)'}}>
                        <div style={cs}>{fmtDate(v.valuation_date)}</div>
                        <div style={{...cs,fontWeight:500}}>{fmt(v.valuation)}</div>
                        <div style={{...cs,color:pe?'var(--text)':'var(--text3)'}}>{pe ? pe+'x' : 'N/A'}</div>
                        <div style={cs}>{dealType}</div>
                        <div style={{...cs}}>
                          {v.source_link
                            ? <a href={v.source_link} target="_blank" rel="noreferrer" style={{color:'var(--accent)',textDecoration:'none',fontWeight:500}}>링크</a>
                            : textSource
                              ? <span style={{color:'var(--text2)'}}>{textSource}</span>
                              : <span style={{color:'var(--text3)'}}>—</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })() : <div style={{color:'var(--text3)',fontSize:13,padding:'20px 0'}}>기업가치 데이터가 없습니다</div>}
        </div>
      )}



      {activeTab === 'review' && (() => {
        const raw = company.inbound_outbound || '';
        const isOutbound = raw.includes('아웃바운드');
        const isInbound = !isOutbound && raw !== 'X' && raw !== '' && raw !== '-';
        // 인바운드일 때 경로 텍스트 (예: "HI 김민정 전무")
        const inboundSource = isInbound ? raw : null;
        return (
          <div className="full-width-section">
            <div className="section-title">딜 검토 현황</div>

            {/* 보고 이력 */}
            <div style={{marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>보고 이력</div>
              {reports.length > 0 ? (
                <table className="history-table">
                  <thead><tr>
                    <th style={{textAlign:'left'}}>보고 날짜</th>
                    <th style={{textAlign:'left'}}>유형</th>
                    <th style={{textAlign:'left'}}>보고 대상</th>
                    <th style={{textAlign:'left'}}>PPT</th>
                    <th style={{textAlign:'left'}}>비고</th>
                  </tr></thead>
                  <tbody>{reports.map(r=>(
                    <tr key={r.id}>
                      <td style={{textAlign:'left'}}>{fmtDate(r.report_date)}</td>
                      <td style={{textAlign:'left',fontFamily:'inherit'}}>{r.report_type || '—'}</td>
                      <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text2)'}}>{r.report_target || '—'}</td>
                      <td style={{textAlign:'left'}}>{r.ppt_link ? <a className="report-link" href={r.ppt_link} target="_blank" rel="noreferrer">PPT 보기 →</a> : <span style={{color:'var(--text3)'}}>—</span>}</td>
                      <td style={{textAlign:'left',fontFamily:'inherit',fontSize:12,color:'var(--text3)'}}>{r.notes || '—'}</td>
                    </tr>
                  ))}</tbody>
                </table>
              ) : <div style={{color:'var(--text3)',fontSize:13,padding:'12px 0'}}>보고 이력이 없습니다. "+ 보고 이력" 버튼으로 추가해주세요.</div>}
            </div>

            {/* 투자/인수 검토 현황 */}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>투자/인수 검토 현황</div>
              {(!company.ma_status || company.ma_status === 'X' || company.ma_status === '-') ? (
                <div style={{color:'var(--text3)',fontSize:13,padding:'12px 0'}}>투자/인수 검토는 진행되지 않았습니다.</div>
              ) : (
                <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)'}}>
                    <span style={{fontSize:16}}>{isInbound?'📥':isOutbound?'📤':'—'}</span>
                    <div>
                      <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>딜 유형</div>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>
                        {isInbound ? '인바운드' : isOutbound ? '아웃바운드' : '—'}
                      </div>
                    </div>
                  </div>
                  {isInbound && inboundSource && (
                    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)'}}>
                      <span style={{fontSize:16}}>👤</span>
                      <div>
                        <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>검토 요청자</div>
                        <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{inboundSource}</div>
                      </div>
                    </div>
                  )}
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)'}}>
                    <span style={{fontSize:16}}>📋</span>
                    <div>
                      <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>검토 결과</div>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{company.ma_status}</div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── LIST VIEW ────────────────────────────────────────────
function ListView({ onSelect }) {
  const [companies, setCompanies] = useState([]);
  const [financials, setFinancials] = useState({});
  const [valuations, setValuations] = useState({});
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [tagFilter, setTagFilter] = useState('');
  const [sortBy, setSortBy] = useState('name');
  const [showUpload, setShowUpload] = useState(false);
  const [showAddCompany, setShowAddCompany] = useState(false);
  const [toast, setToast] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const [c, f, v] = await Promise.all([
      supabase.from('companies').select('*').order('name'),
      supabase.from('financials').select('*').order('fiscal_date', {ascending:false}),
      supabase.from('valuations').select('*').order('valuation_date', {ascending:false}),
    ]);
    const companies = c.data || [];
    // 기업별 최신 재무/기업가치
    const fMap = {}, vMap = {};
    for (const row of (f.data||[])) { if (!fMap[row.company_id]) fMap[row.company_id] = row; }
    for (const row of (f.data||[])) { if (!fMap[row.company_id+'_prev'] && fMap[row.company_id] && fMap[row.company_id].id !== row.id) fMap[row.company_id+'_prev'] = row; }
    for (const row of (v.data||[])) { if (!vMap[row.company_id]) vMap[row.company_id] = row; }
    setCompanies(companies);
    setFinancials(fMap);
    setValuations(vMap);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  // 전체 태그 목록
  const allTags = [...new Set(companies.flatMap(c=>c.tags||[]))].sort();

  let filtered = companies.filter(c => {
    const q = search.toLowerCase();
    const matchSearch = !q || c.name.toLowerCase().includes(q) || (c.tags||[]).some(t=>t.toLowerCase().includes(q)) || (c.industry||'').toLowerCase().includes(q);
    const matchTag = !tagFilter || (c.tags||[]).includes(tagFilter);
    return matchSearch && matchTag;
  });

  // 정렬
  filtered = [...filtered].sort((a,b) => {
    if (sortBy === 'name') return a.name.localeCompare(b.name, 'ko');
    if (sortBy === 'revenue') return (financials[b.id]?.revenue||0) - (financials[a.id]?.revenue||0);
    if (sortBy === 'valuation') return (valuations[b.id]?.valuation||0) - (valuations[a.id]?.valuation||0);
    if (sortBy === 'updated') return new Date(b.updated_at||0) - new Date(a.updated_at||0);
    return 0;
  });


  return (
    <div>
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      {showUpload && <ExcelUpload onClose={()=>setShowUpload(false)} onDone={()=>{load();setToast({msg:'엑셀 데이터가 업데이트됐어요',type:'success'});}}/>}
      {showAddCompany && <AddCompanyModal onClose={()=>setShowAddCompany(false)} onSave={()=>{load();setToast({msg:'새 기업이 추가됐어요',type:'success'});}}/>}


      <div className="toolbar">
        <div className="search-box">
          <input placeholder="기업명, 태그, 업종 검색..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="filter-select" value={tagFilter} onChange={e=>setTagFilter(e.target.value)}>
          <option value="">전체 태그</option>
          {allTags.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <select className="filter-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name">이름순</option>
          <option value="revenue">매출 높은순</option>
          <option value="valuation">기업가치 높은순</option>
          <option value="updated">최근 업데이트순</option>
        </select>
        <button className="btn btn-primary" onClick={()=>setShowAddCompany(true)}>+ 기업 추가</button>
        <button className="btn btn-success" onClick={()=>setShowUpload(true)}>📊 엑셀 업로드</button>
      </div>

      {loading ? (
        <div className="loading"><div className="spinner"/><span>데이터 불러오는 중...</span></div>
      ) : (
        <div className="table-wrap">
          <div className="table-header">
            <span onClick={()=>setSortBy('name')}>기업명 {sortBy==='name'&&'↑'}</span>
            <span>태그</span>
            <span onClick={()=>setSortBy('revenue')}>매출</span>
            <span>영업이익</span>
            <span onClick={()=>setSortBy('valuation')}>기업가치</span>
            <span></span>
          </div>
          {filtered.length === 0 ? (
            <div className="empty-state"><div className="empty-icon">🔍</div><div>검색 결과가 없습니다</div></div>
          ) : filtered.map(company => {
            const f = financials[company.id];
            const fp = financials[company.id+'_prev'];
            const v = valuations[company.id];
            const revChange = f && fp ? calcChange(f.revenue, fp.revenue) : null;
            return (
              <div key={company.id} className="table-row" onClick={()=>onSelect(company)}>
                <div>
                  <div className="company-name">{company.name}</div>
                  <div className="company-industry">{company.industry}</div>
                </div>
                <div className="tags-wrap">
                  {(company.tags||[]).slice(0,3).map(t=><span key={t} className="tag">{t}</span>)}
                  {(company.tags||[]).length > 3 && <span className="tag">+{(company.tags||[]).length-3}</span>}
                </div>
                <div>
                  <div className="mono">{fmt(f?.revenue)}</div>
                  {revChange && <div className={`change ${Number(revChange)>=0?'up':'down'}`} style={{fontSize:11}}>{Number(revChange)>=0?'↑':'↓'}{Math.abs(revChange)}%</div>}
                </div>
                <div>
                  <div className="mono" style={{color:f?.operating_profit==null?'var(--text3)':f.operating_profit<0?'var(--red)':'var(--text)'}}>
                    {fmt(f?.operating_profit)}
                  </div>
                  {(() => {
                    const fp2 = financials[company.id+'_prev'];
                    const opChange = f?.operating_profit!=null && fp2?.operating_profit!=null && fp2.operating_profit!==0
                      ? calcChange(f.operating_profit, fp2.operating_profit) : null;
                    return opChange ? <div className={`change ${Number(opChange)>=0?'up':'down'}`} style={{fontSize:11}}>{Number(opChange)>=0?'↑':'↓'}{Math.abs(opChange)}%</div> : null;
                  })()}
                </div>
                <div className="mono">{fmt(v?.valuation)}</div>
                <div style={{color:'var(--text3)',fontSize:18}}>›</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────
function App() {
  const [selected, setSelected] = useState(null);
  return (
    <div className="app">
      <header className="header">
        <div className="header-logo">
          <span>●</span> Longlist <span style={{color:'var(--text3)',fontWeight:400}}>Platform</span>
        </div>
        <div style={{fontSize:12,color:'var(--text3)',fontFamily:'MaruBuri,sans-serif'}}>
          {new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}
        </div>
      </header>
      <main className="main">
        {selected ? (
          <DetailView company={selected} onBack={()=>setSelected(null)}/>
        ) : (
          <ListView onSelect={setSelected}/>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
