<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Longlist Platform</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4;
    --bg2: #ffffff;
    --bg3: #f0ede8;
    --border: #e5e0d8;
    --border2: #d4cdc3;
    --text: #1a1714;
    --text2: #6b6560;
    --text3: #9e9890;
    --accent: #ff6a00;
    --accent2: #e85500;
    --green: #16a34a;
    --red: #dc2626;
    --amber: #f59e0b;
    --purple: #7c3aed;
    --teal: #0d9488;
  }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #root { min-height: 100vh; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header { background: var(--bg2); border-bottom: 2px solid var(--accent); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .header-logo span { color: var(--accent); }
  .header-nav { display: flex; gap: 4px; }
  .nav-btn { background: none; border: none; color: var(--text2); font-size: 13px; font-family: inherit; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.active { background: var(--accent); color: #fff; }
  .main { flex: 1; padding: 28px 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* STATS BAR */
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px 9px 36px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; transition: border 0.15s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before { content: '⌕'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; pointer-events: none; }
  .filter-select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 14px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; cursor: pointer; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); }
  .btn-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .btn-success:hover { background: rgba(34,197,94,0.25); }

  /* TABLE */
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { display: grid; grid-template-columns: 2fr 2fr 1.2fr 1.2fr 1.2fr 1fr 80px; padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .table-header span { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .table-header span:hover { color: var(--text2); }
  .table-row { display: grid; grid-template-columns: 2fr 2fr 1.2fr 1.2fr 1.2fr 1fr 80px; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; transition: background 0.12s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: #fff5f0; }
  .company-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .company-industry { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #f0ede8; border: 1px solid var(--border); color: var(--text2); white-space: nowrap; }
  .tag.sector { background: rgba(255,106,0,0.08); border-color: rgba(255,106,0,0.3); color: var(--accent); }
  .mono { font-family: 'DM Mono', monospace; font-size: 13px; }
  .change { display: flex; align-items: center; gap: 4px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .change.up { color: var(--green); }
  .change.down { color: var(--red); }
  .change.flat { color: var(--text3); }
  .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
  .status-done { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .status-ongoing { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .status-closed { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .status-hold { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
  .date-text { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* DETAIL */
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .detail-title { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
  .detail-sub { font-size: 13px; color: var(--text2); margin-top: 6px; display: flex; gap: 16px; flex-wrap: wrap; }
  .detail-sub span { display: flex; align-items: center; gap: 5px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .detail-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 12px; color: var(--text3); }
  .info-value { font-size: 13px; color: var(--text); font-weight: 500; text-align: right; }
  .history-table { width: 100%; border-collapse: collapse; }
  .history-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .history-table th { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 14px; text-align: right; border-bottom: 1px solid var(--border); background: var(--bg3); }
  .history-table th:first-child { text-align: left; }
  .history-table td { padding: 10px 14px; font-size: 13px; font-family: 'DM Mono', monospace; text-align: right; border-bottom: 1px solid var(--border); color: var(--text); }
  .history-table td:first-child { text-align: left; color: var(--text); font-family: inherit; font-weight: 500; }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: #fff5f0; }
  .full-width-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .report-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .report-row:last-child { border-bottom: none; }
  .report-date { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text2); min-width: 90px; }
  .report-type { font-size: 12px; color: var(--text); flex: 1; }
  .report-link { font-size: 12px; color: var(--accent); text-decoration: none; }
  .report-link:hover { text-decoration: underline; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text2); font-size: 13px; cursor: pointer; margin-bottom: 20px; background: none; border: none; font-family: inherit; padding: 0; }
  .back-btn:hover { color: var(--text); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 24px 24px 0; display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input { width: 100%; background: #f8f7f4; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text); font-family: inherit; outline: none; transition: border 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-textarea { width: 100%; background: #f8f7f4; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text); font-family: inherit; outline: none; resize: vertical; min-height: 80px; transition: border 0.15s; }
  .form-textarea:focus { border-color: var(--accent); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 8px; }

  /* UPLOAD */
  .upload-zone { border: 2px dashed var(--border2); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .upload-zone:hover { border-color: var(--accent); background: rgba(79,127,255,0.05); }
  .upload-icon { font-size: 32px; margin-bottom: 12px; }
  .upload-text { font-size: 14px; color: var(--text2); }
  .upload-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; padding: 80px; color: var(--text3); gap: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* TABS */
  .tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* LISTING STATUS */
  .listing-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .listing-kospi { background: rgba(45,212,191,0.1); color: var(--teal); border: 1px solid rgba(45,212,191,0.2); }
  .listing-private { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
  .listing-private-audit { background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #ffffff; border: 1px solid var(--border2); border-radius: 10px; padding: 14px 20px; font-size: 13px; color: var(--text); z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideUp 0.2s ease; }
  .toast.success { border-color: rgba(34,197,94,0.4); }
  .toast.error { border-color: rgba(239,68,68,0.4); }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  select option { background: var(--bg2); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPABASE_URL = 'https://mtcjomtptsgkdhqwewjj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10Y2pvbXRwdHNna2RocXdld2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzUzMjAsImV4cCI6MjA5MzcxMTMyMH0.tZehQIZ6XXhKcT9Ib7p_x7hBQwIVBqS3MXwEq2-yIF0';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  global: {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  }
});

// ─── UTILS ───────────────────────────────────────────────
function fmt(v) {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return v;
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1) + '조';
  return n.toLocaleString('ko-KR', {maximumFractionDigits:1}) + '억';
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'});
}
function calcChange(curr, prev) {
  if (curr == null || prev == null || prev === 0) return null;
  return ((curr - prev) / Math.abs(prev) * 100).toFixed(1);
}
function getStatusBadge(status) {
  if (!status || status === 'X' || status === '-') return null;
  if (status.includes('완료') || status.includes('진행중')) return <span className="status-badge status-ongoing">{status}</span>;
  if (status.includes('종결')) return <span className="status-badge status-closed">{status}</span>;
  if (status.includes('보류')) return <span className="status-badge status-hold">{status}</span>;
  if (status.includes('검토')) return <span className="status-badge status-ongoing">{status}</span>;
  return <span className="status-badge status-hold">{status}</span>;
}
function getListingBadge(s) {
  if (!s) return null;
  if (s.includes('코스피') || s.includes('코스닥')) return <span className="listing-badge listing-kospi">{s}</span>;
  if (s.includes('외감X')) return <span className="listing-badge listing-private">{s}</span>;
  return <span className="listing-badge listing-private-audit">{s}</span>;
}

// ─── TOAST ───────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{type === 'success' ? '✓ ' : '✗ '}{msg}</div>;
}

// ─── FINANCIAL UPDATE MODAL ───────────────────────────────
function FinancialModal({ company, onClose, onSave }) {
  const [form, setForm] = useState({ quarter: '', fiscal_date: '', revenue: '', operating_profit: '', total_assets: '', net_assets: '', source: '', memo: '' });
  const [loading, setLoading] = useState(false);
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  async function submit() {
    if (!form.fiscal_date || !form.quarter) return alert('분기와 결산기준일을 입력해주세요');
    setLoading(true);
    const { error } = await supabase.from('financials').insert({
      company_id: company.id, quarter: form.quarter, fiscal_date: form.fiscal_date,
      revenue: form.revenue || null, operating_profit: form.operating_profit || null,
      total_assets: form.total_assets || null, net_assets: form.net_assets || null,
      source: form.source || null, memo: form.memo || null
    });
    setLoading(false);
    if (!error) { onSave(); onClose(); } else alert('저장 실패: ' + error.message);
  }
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">수치 업데이트 · {company.name}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">분기</label>
              <input className="form-input" placeholder="예: 2025 Q1" value={form.quarter} onChange={e=>set('quarter',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">결산기준일</label>
              <input type="date" className="form-input" value={form.fiscal_date} onChange={e=>set('fiscal_date',e.target.value)}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">매출 (억원)</label>
              <input type="number" className="form-input" placeholder="0" value={form.revenue} onChange={e=>set('revenue',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">영업이익 (억원)</label>
              <input type="number" className="form-input" placeholder="0" value={form.operating_profit} onChange={e=>set('operating_profit',e.target.value)}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">총자산 (억원)</label>
              <input type="number" className="form-input" placeholder="0" value={form.total_assets} onChange={e=>set('total_assets',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">순자산 (억원)</label>
              <input type="number" className="form-input" placeholder="0" value={form.net_assets} onChange={e=>set('net_assets',e.target.value)}/>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">출처</label>
            <input className="form-input" placeholder="예: 다트전자공시, 크레탑" value={form.source} onChange={e=>set('source',e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">메모 (변화 이유)</label>
            <textarea className="form-textarea" placeholder="주요 변화 내용, 특이사항 등" value={form.memo} onChange={e=>set('memo',e.target.value)}/>
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={onClose}>취소</button>
            <button className="btn btn-primary" onClick={submit} disabled={loading}>{loading ? '저장 중...' : '저장'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── VALUATION MODAL ─────────────────────────────────────
function ValuationModal({ company, onClose, onSave }) {
  const [form, setForm] = useState({ valuation_date: '', valuation: '', pe_multiple: '', memo: '' });
  const [loading, setLoading] = useState(false);
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  async function submit() {
    if (!form.valuation_date) return alert('기준일을 입력해주세요');
    setLoading(true);
    const { error } = await supabase.from('valuations').insert({
      company_id: company.id, valuation_date: form.valuation_date,
      valuation: form.valuation || null, pe_multiple: form.pe_multiple || null, memo: form.memo || null
    });
    setLoading(false);
    if (!error) { onSave(); onClose(); } else alert('저장 실패: ' + error.message);
  }
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">기업가치 업데이트 · {company.name}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">기준일</label>
              <input type="date" className="form-input" value={form.valuation_date} onChange={e=>set('valuation_date',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">기업가치 (억원)</label>
              <input type="number" className="form-input" placeholder="0" value={form.valuation} onChange={e=>set('valuation',e.target.value)}/>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">P/E 멀티플</label>

// ─── EXCEL UPLOAD ─────────────────────────────────────────
function ExcelUpload({ onClose, onDone }) {
  const [status, setStatus] = useState('idle');
  const [log, setLog] = useState([]);
  const fileRef = useRef();

  async function handleFile(file) {
    setStatus('processing');
    setLog(['파일 읽는 중...']);
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets['마스터DB'];
    if (!ws) { setLog(['❌ "마스터DB" 시트를 찾을 수 없어요']); setStatus('done'); return; }
    const rows = XLSX.utils.sheet_to_json(ws, { defval: null });
    setLog(l => [...l, `${rows.length}개 기업 데이터 발견`]);
    let ok = 0, fail = 0;
    for (const row of rows) {
      const name = row['회사명'];
      if (!name) continue;
      const tags = row['태그'] ? row['태그'].split(',').map(t=>t.trim()) : [];
      const { error } = await supabase.from('companies').upsert({
        name, location: row['소재지'] || null, ceo: row['대표자명'] || null,
        employee_count: String(row['임직원수'] || ''), listing_status: row['상장여부'] || null,
        industry: row['업종'] || null, tags, ma_status: row['M&A 추진 여부 및 진행단계'] || null,
        inbound_outbound: row['아웃바운드 or 인바운드 경로'] || null
      }, { onConflict: 'name' });
      if (error) { fail++; setLog(l => [...l, `❌ ${name}: ${error.message}`]); }
      else { ok++; }
    }
    setLog(l => [...l, `✅ 완료: ${ok}개 성공, ${fail}개 실패`]);
    setStatus('done');
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">엑셀 일괄 업로드</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {status === 'idle' && (
            <>
              <div className="upload-zone" onClick={() => fileRef.current.click()}>
                <div className="upload-icon">📊</div>
                <div className="upload-text">엑셀 파일을 클릭해서 선택하세요</div>
                <div className="upload-sub">"마스터DB" 시트 기준으로 업데이트됩니다</div>
                <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
              </div>
              <div style={{marginTop:16,fontSize:12,color:'var(--text3)'}}>
                * 기존 기업은 업데이트, 새 기업은 추가됩니다<br/>
                * 재무실적은 SQL Editor에서 별도 업데이트 권장
              </div>
            </>
          )}
          {(status === 'processing' || status === 'done') && (
            <div style={{background:'var(--bg3)',borderRadius:8,padding:16,fontFamily:'DM Mono,monospace',fontSize:12,color:'var(--text2)',lineHeight:2}}>
              {log.map((l,i) => <div key={i}>{l}</div>)}
              {status === 'processing' && <div style={{color:'var(--accent)'}}>처리 중...</div>}
            </div>
          )}
          <div className="modal-footer" style={{marginTop:16}}>
            {status === 'done' ? <button className="btn btn-primary" onClick={() => {onDone(); onClose();}}>완료</button> : <button className="btn btn-secondary" onClick={onClose}>취소</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

            const tas = sorted.map(f => Number(f.total_assets)||0);
            const nas = sorted.map(f => Number(f.net_assets)||0);
            const maxPos = Math.max(...revenues, ...ops.filter(v=>v>0), 0);

            const total = maxPos + maxNeg || 1;
            const maxAsset = Math.max(...tas, ...nas.filter(v=>v>0), 1);

            const MiniChart = ({data, scales, color, color2, xLabels}) => {
              const W = 320; const H = 120; const pad = {l:52,r:10,t:20,b:24};
              const innerW = W-pad.l-pad.r; const innerH = H-pad.t-pad.b;
              const n = data[0].length;
              const colW2 = Math.floor(innerW/n);
              const bW = Math.min(16, Math.floor(colW2/2.8));
              const gap = 3;
              // 각 시리즈별 독립 스케일
              const getScale = (idx) => {
                const vals = data[idx];
                const posMax = Math.max(...vals.filter(v=>v>0), 0);
                const negMax = Math.abs(Math.min(...vals.filter(v=>v<0), 0));
                return { posMax: posMax||1, negMax };
              };
              // 공유 0선 위치: 첫번째 시리즈 기준
              const s0 = scales ? scales[0] : getScale(0);
              const total0 = s0.posMax + s0.negMax;
              const zeroY = pad.t + innerH * (s0.posMax / (total0||1));
              // Y축 눈금 (첫번째 시리즈 기준)
              const absMax0 = s0.posMax;
              const mag = Math.pow(10, Math.floor(Math.log10(absMax0||1)));
              const ti = absMax0 <= mag*2 ? mag : absMax0 <= mag*5 ? mag*2 : mag*5;
              const posTicks = []; for(let v=ti; v<=s0.posMax*1.05; v+=ti) { if(posTicks.length<3) posTicks.push(v); }
              const negTicks2 = []; for(let v=ti; v<=s0.negMax*1.05; v+=ti) { if(negTicks2.length<3) negTicks2.push(v); }
              return (
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
                  {posTicks.map(v => {
                    const y = zeroY - (v/s0.posMax)*(zeroY-pad.t);
                    return <g key={v}>
                      <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3"/>
                      <text x={pad.l-3} y={y+3} textAnchor="end" fontSize="8" fill="var(--text3)" fontFamily="DM Mono,monospace">{fmt(v)}</text>
                    </g>;
                  })}
                  {negTicks2.map(v => {
                    const y = zeroY + (v/(s0.negMax||1))*(H-pad.b-zeroY);
                    return <g key={-v}>
                      <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3"/>
                      <text x={pad.l-3} y={y+3} textAnchor="end" fontSize="8" fill="var(--text3)" fontFamily="DM Mono,monospace">-{fmt(v)}</text>
                    </g>;
                  })}
                  <line x1={pad.l} y1={zeroY} x2={W-pad.r} y2={zeroY} stroke="var(--border2)" strokeWidth="1.2"/>
                  <text x={pad.l-3} y={zeroY+3} textAnchor="end" fontSize="8" fill="var(--text3)" fontFamily="DM Mono,monospace">0</text>
                  {data[0].map((_, i) => {
                    const colX = pad.l + i*colW2 + (colW2-(bW*data.length+gap*(data.length-1)))/2;
                    return data.map((series, si) => {
                      const v = Number(series[i])||0;
                      const sc = scales ? scales[si] : getScale(si);
                      const posH = zeroY - pad.t;
                      const negH = H - pad.b - zeroY;
                      const bH = v >= 0
                        ? Math.max(Math.round((v/(sc.posMax||1))*posH), 2)
                        : Math.max(Math.round((Math.abs(v)/(sc.negMax||1))*negH), 2);
                      const bX = colX + si*(bW+gap);
                      const bY = v >= 0 ? zeroY-bH : zeroY;
                      const cl = si===0 ? color : color2||'rgba(255,106,0,0.38)';
                      return <rect key={si} x={bX} y={bY} width={bW} height={bH} fill={cl} rx="2"/>;
                    });
                  })}
                  {(xLabels||[]).map((lbl,i) => (
                    <text key={i} x={pad.l+i*colW2+colW2/2} y={H-pad.b+12} textAnchor="middle" fontSize="8" fill="var(--text3)" fontFamily="DM Mono,monospace">{lbl}</text>
                  ))}
                </svg>
              );
            };

            return (
              <div style={{display:'flex',flexDirection:'column',gap:20}}>
                {/* 섹션1: 손익 */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,alignItems:'start'}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>손익 현황</div>
                    <table className="history-table" style={{fontSize:12}}>
                      <thead><tr>
                        <th style={{textAlign:'left',fontSize:10}}>결산기준일</th>
                        <th style={{fontSize:10}}>매출</th>
                        <th style={{fontSize:10}}>영업이익</th>
                        <th style={{fontSize:10}}>영업이익률</th>
                      </tr></thead>
                      <tbody>{financials.map((f,i) => {
                        const prev = financials[i+1];
                        const revChg = prev?.revenue ? calcChange(f.revenue, prev.revenue) : null;
                        const opChg = prev?.operating_profit && prev.operating_profit !== 0 ? calcChange(f.operating_profit, prev.operating_profit) : null;
                        const opMargin = f.revenue && f.revenue !== 0 ? ((Number(f.operating_profit)||0) / Number(f.revenue) * 100).toFixed(1) : null;
                        return (
                        <tr key={f.id}>

                          </td>
                          <td style={{fontSize:12}}>
                            <span style={{color:f.operating_profit==null?'var(--text3)':f.operating_profit>=0?'var(--green)':'var(--red)'}}>{fmt(f.operating_profit)}</span>
                            {opChg && <span style={{fontSize:9,color:Number(opChg)>=0?'var(--green)':'var(--red)',marginLeft:4}}>{Number(opChg)>=0?'▲':'▼'}{Math.abs(opChg)}%</span>}
                          </td>
                          <td style={{fontSize:12,color:opMargin===null?'var(--text3)':Number(opMargin)>=0?'var(--green)':'var(--red)',fontFamily:'DM Mono,monospace'}}>
                            {opMargin !== null ? opMargin + '%' : '—'}
                          </td>
                        </tr>
                        );
                      })}</tbody>
                    </table>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>매출 / 영업이익 추이</div>
                    {(() => {
                      const revScale = { posMax: Math.max(...revenues,1), negMax: 0 };
                      const opPosMax = Math.max(...ops.filter(v=>v>0), 0);
                      const opNegMax = Math.abs(Math.min(...ops.filter(v=>v<0), 0));
                      const opScale = { posMax: opPosMax||opNegMax||1, negMax: opNegMax };
                      // 0선은 revenues 기준, op는 독립 스케일
                      const sharedPosMax = Math.max(revScale.posMax, opPosMax);
                      const sharedNegMax = opNegMax;
                      const s0 = { posMax: sharedPosMax, negMax: sharedNegMax };
                      return <MiniChart
                        data={[revenues, ops]}
                        scales={[s0, s0]}
                        color="var(--accent)" color2="rgba(255,106,0,0.38)"
                        xLabels={sorted.map(f=>new Date(f.fiscal_date).getFullYear())}
                      />;
                    })()}
                    <div style={{display:'flex',gap:14,marginTop:6,fontSize:11,color:'var(--text2)'}}>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'var(--accent)',display:'inline-block'}}/> 매출</span>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'rgba(255,106,0,0.38)',display:'inline-block'}}/> 영업이익</span>
                    </div>
                  </div>
                </div>

                {/* 구분선 */}
                <div style={{borderTop:'1px solid var(--border)'}}/>

                {/* 섹션2: 재무상태 */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,alignItems:'start'}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>재무상태</div>
                    <table className="history-table" style={{fontSize:12}}>
                      <thead><tr>
                        <th style={{textAlign:'left',fontSize:10}}>결산기준일</th>
                        <th style={{fontSize:10}}>총자산</th>
                        <th style={{fontSize:10}}>순자산</th>
                        <th style={{fontSize:10}}>출처</th>
                      </tr></thead>
                      <tbody>{financials.map(f => (
                        <tr key={f.id}>
                          <td style={{textAlign:'left',fontFamily:'DM Mono,monospace',fontSize:11}}>{fmtDate(f.fiscal_date)}</td>
                          <td style={{fontSize:12}}>{fmt(f.total_assets)}</td>
                          <td style={{fontSize:12,color:f.net_assets!=null&&Number(f.net_assets)<0?'var(--red)':'var(--text)'}}>{fmt(f.net_assets)}</td>
                          <td style={{fontFamily:'inherit',fontSize:11,color:'var(--text3)'}}>{f.source||'—'}</td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>총자산 / 순자산 추이</div>
                    {(() => {
                      const taMax = Math.max(...tas, 1);
                      const naPos = Math.max(...nas.filter(v=>v>0), 0);
                      const naNeg = Math.abs(Math.min(...nas.filter(v=>v<0), 0));
                      const assetScale = { posMax: Math.max(taMax, naPos), negMax: naNeg };
                      return <MiniChart
                        data={[tas, nas]}
                        scales={[assetScale, assetScale]}
                        color="var(--accent)" color2="rgba(255,106,0,0.38)"
                        xLabels={sorted.map(f=>new Date(f.fiscal_date).getFullYear())}
                      />;
                    })()}
                    <div style={{display:'flex',gap:14,marginTop:6,fontSize:11,color:'var(--text2)'}}>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'var(--accent)',display:'inline-block'}}/> 총자산</span>
                      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'rgba(255,106,0,0.38)',display:'inline-block'}}/> 순자산</span>
                    </div>
                  </div>
                </div>
              </div>
            );
          })() : <div style={{color:'var(--text3)',fontSize:13}}>데이터가 없습니다</div>}
        </div>
      )}
      {activeTab === 'valuations' && (
        <div className="full-width-section">
          <div className="section-title">기업가치 이력 (누적)</div>
          {valuations.length > 0 ? (() => {
            const sorted = [...valuations].sort((a,b) => new Date(a.valuation_date) - new Date(b.valuation_date));
            const latest = sorted[sorted.length-1];
            const maxVal = Math.max(...sorted.map(v => Number(v.valuation)||0), 1);
            const magnitude = Math.pow(10, Math.floor(Math.log10(maxVal)));
            const ti = maxVal <= magnitude*2 ? magnitude/2 : maxVal <= magnitude*5 ? magnitude : magnitude*2;
            const ticks = [];
            for(let v=ti; v<=maxVal*1.15; v+=ti) ticks.push(v);
            const yAxisW = 52; const chartH = 160; const padT = 20; const padB = 28; const padR = 12;
            const innerH = chartH - padT - padB;
            const colW = Math.max(60, Math.floor((500) / sorted.length));
            const svgW = Math.max(sorted.length * colW + yAxisW + padR, 400);
            const barW = Math.min(32, colW - 16);
            return (
              <div>
                {/* 요약 헤더 */}
                <div style={{display:'flex',gap:32,marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
                  <div>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>최신 기업가치</div>
                    <div style={{fontSize:20,fontWeight:700,fontFamily:'DM Mono,monospace',color:'var(--accent)'}}>{fmt(latest.valuation)}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(latest.valuation_date)} · {latest.memo||'—'}</div>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>기업가치 건수</div>
                    <div style={{fontSize:20,fontWeight:700,fontFamily:'DM Mono,monospace',color:'var(--text)'}}>{sorted.length}건</div>
                  </div>
                  {sorted.length >= 2 && (() => {
                    const first = sorted[0];
                    const chg = calcChange(latest.valuation, first.valuation);
                    return (
                      <div>
                        <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>초기 대비 변화</div>
                        <div style={{fontSize:20,fontWeight:700,fontFamily:'DM Mono,monospace',color:Number(chg)>=0?'var(--green)':'var(--red)'}}>
                          {Number(chg)>=0?'▲':'▼'}{Math.abs(chg)}%
                        </div>
                        <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmt(first.valuation)} → {fmt(latest.valuation)}</div>
                      </div>
                    );
                  })()}
                </div>
                {/* 차트 */}
                <div style={{overflowX:'auto'}}>
                  <svg width="100%" viewBox={`0 0 ${svgW} ${chartH}`} style={{display:'block',minWidth:300}}>
                    {/* Y축 눈금 */}
                    {ticks.map(v => {
                      const y = padT + innerH - Math.round((v/maxVal/1.15)*innerH);
                      return (
                        <g key={v}>
                          <line x1={yAxisW} y1={y} x2={svgW-padR} y2={y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="3,3"/>
                          <text x={yAxisW-4} y={y+3} textAnchor="end" fontSize="9" fill="var(--text3)" fontFamily="DM Mono,monospace">{fmt(v)}</text>
                        </g>
                      );
                    })}
                    {/* X축 기준선 */}
                    <line x1={yAxisW} y1={padT+innerH} x2={svgW-padR} y2={padT+innerH} stroke="var(--border2)" strokeWidth="1"/>
                    {/* 막대 */}
                    {sorted.map((v, i) => {
                      const val = Number(v.valuation)||0;
                      const bH = Math.max(Math.round((val/maxVal/1.15)*innerH), 2);
                      const colX = yAxisW + i*colW + (colW-barW)/2;
                      const bY = padT + innerH - bH;
                      const isLatest = i === sorted.length-1;
                      return (
                        <g key={v.id}>
                          <rect x={colX} y={bY} width={barW} height={bH}
                            fill={isLatest ? 'var(--accent)' : 'rgba(255,106,0,0.35)'}
                            rx="3"/>
                          {/* 수치 레이블 */}
                          <text x={colX+barW/2} y={bY-4} textAnchor="middle" fontSize="9" fill="var(--text2)" fontFamily="DM Mono,monospace">{fmt(val)}</text>
                          {/* X축 날짜 */}
                          <text x={colX+barW/2} y={padT+innerH+14} textAnchor="middle" fontSize="8" fill="var(--text3)" fontFamily="DM Mono,monospace">
                            {new Date(v.valuation_date).getFullYear()}.{String(new Date(v.valuation_date).getMonth()+1).padStart(2,'0')}
                          </text>
                          {/* 거래유형 */}
                          {v.memo && <text x={colX+barW/2} y={padT+innerH+24} textAnchor="middle" fontSize="7" fill="var(--text3)" fontFamily="inherit">{v.memo}</text>}
                        </g>
                      );
                    })}
                  </svg>
                </div>
                {/* 상세 테이블 */}
                <div style={{marginTop:20}}>
                  <table className="history-table">
                    <thead><tr>
                      <th style={{textAlign:'left'}}>기준일</th>
                      <th>기업가치</th>
                      <th>거래 유형</th>
                      <th>P/E</th>
                      <th style={{textAlign:'left'}}>출처</th>
                    </tr></thead>
                    <tbody>{sorted.slice().reverse().map(v => (
                      <tr key={v.id}>
                        <td style={{textAlign:'left',fontFamily:'DM Mono,monospace'}}>{fmtDate(v.valuation_date)}</td>
                        <td style={{fontWeight:500}}>{fmt(v.valuation)}</td>
                        <td style={{fontFamily:'inherit',fontSize:12,color:'var(--text2)'}}>{v.memo||'—'}</td>
                        <td>{v.pe_multiple ? v.pe_multiple + 'x' : '—'}</td>
                        <td style={{textAlign:'left'}}>
                          {v.source_link
                            ? <a href={v.source_link} target="_blank" rel="noreferrer" className="report-link">출처 →</a>
                            : <span style={{fontSize:12,color:'var(--text3)'}}>—</span>}
                        </td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            );
          })() : <div style={{color:'var(--text3)',fontSize:13,padding:'20px 0'}}>기업가치 데이터가 없습니다</div>}
        </div>
      )}

      {activeTab === 'reports' && (
        <div className="full-width-section">
          <div className="section-title">보고 이력</div>
          {reports.length > 0 ? (
            <table className="history-table">
              <thead><tr>
                <th style={{textAlign:'left'}}>보고 날짜</th>
                <th style={{textAlign:'left'}}>유형</th>
                <th style={{textAlign:'left'}}>보고 대상</th>
                <th style={{textAlign:'left'}}>PPT</th>
                <th style={{textAlign:'left'}}>비고</th>
              </tr></thead>
              <tbody>{reports.map(r=>(
                <tr key={r.id}>
                  <td style={{textAlign:'left',fontFamily:'DM Mono,monospace'}}>{fmtDate(r.report_date)}</td>
                  <td style={{textAlign:'left',fontFamily:'inherit'}}>{r.report_type || '—'}</td>
                  <td style={{textAlign:'left',fontFamily:'inherit',color:'var(--text2)'}}>{r.report_target || '—'}</td>
                  <td style={{textAlign:'left'}}>{r.ppt_link ? <a className="report-link" href={r.ppt_link} target="_blank" rel="noreferrer">PPT 보기 →</a> : <span style={{color:'var(--text3)'}}>—</span>}</td>
                  <td style={{textAlign:'left',fontFamily:'inherit',fontSize:12,color:'var(--text3)'}}>{r.notes || '—'}</td>
                </tr>
              ))}</tbody>
            </table>
          ) : <div style={{color:'var(--text3)',fontSize:13,padding:'20px 0'}}>보고 이력이 없습니다. "+ 보고 이력" 버튼으로 추가해주세요.</div>}
        </div>
      )}
    </div>
  );
}

// ─── LIST VIEW ────────────────────────────────────────────
function ListView({ onSelect }) {
  const [companies, setCompanies] = useState([]);
  const [financials, setFinancials] = useState({});
  const [valuations, setValuations] = useState({});
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [tagFilter, setTagFilter] = useState('');
  const [sortBy, setSortBy] = useState('name');
  const [showUpload, setShowUpload] = useState(false);
  const [toast, setToast] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const [c, f, v] = await Promise.all([
      supabase.from('companies').select('*').order('name'),
      supabase.from('financials').select('*').order('fiscal_date', {ascending:false}),
      supabase.from('valuations').select('*').order('valuation_date', {ascending:false}),
    ]);
    const companies = c.data || [];
    // 기업별 최신 재무/기업가치
    const fMap = {}, vMap = {};
    for (const row of (f.data||[])) { if (!fMap[row.company_id]) fMap[row.company_id] = row; }
    for (const row of (f.data||[])) { if (!fMap[row.company_id+'_prev'] && fMap[row.company_id] && fMap[row.company_id].id !== row.id) fMap[row.company_id+'_prev'] = row; }
    for (const row of (v.data||[])) { if (!vMap[row.company_id]) vMap[row.company_id] = row; }
    setCompanies(companies);
    setFinancials(fMap);
    setValuations(vMap);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  // 전체 태그 목록
  const allTags = [...new Set(companies.flatMap(c=>c.tags||[]))].sort();

  let filtered = companies.filter(c => {
    const q = search.toLowerCase();
    const matchSearch = !q || c.name.toLowerCase().includes(q) || (c.tags||[]).some(t=>t.toLowerCase().includes(q)) || (c.industry||'').toLowerCase().includes(q);
    const matchTag = !tagFilter || (c.tags||[]).includes(tagFilter);
    return matchSearch && matchTag;
  });

  // 정렬
  filtered = [...filtered].sort((a,b) => {
    if (sortBy === 'name') return a.name.localeCompare(b.name, 'ko');
    if (sortBy === 'revenue') return (financials[b.id]?.revenue||0) - (financials[a.id]?.revenue||0);
    if (sortBy === 'valuation') return (valuations[b.id]?.valuation||0) - (valuations[a.id]?.valuation||0);
    if (sortBy === 'updated') return new Date(b.updated_at||0) - new Date(a.updated_at||0);
    return 0;
  });


  return (
    <div>
      {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
      {showUpload && <ExcelUpload onClose={()=>setShowUpload(false)} onDone={()=>{load();setToast({msg:'엑셀 데이터가 업데이트됐어요',type:'success'});}}/>}


      <div className="toolbar">
        <div className="search-box">
          <input placeholder="기업명, 태그, 업종 검색..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="filter-select" value={tagFilter} onChange={e=>setTagFilter(e.target.value)}>
          <option value="">전체 태그</option>
          {allTags.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <select className="filter-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="name">이름순</option>
          <option value="revenue">매출 높은순</option>
          <option value="valuation">기업가치 높은순</option>
          <option value="updated">최근 업데이트순</option>
        </select>
        <button className="btn btn-success" onClick={()=>setShowUpload(true)}>📊 엑셀 업로드</button>
      </div>

      {loading ? (
        <div className="loading"><div className="spinner"/><span>데이터 불러오는 중...</span></div>
      ) : (
        <div className="table-wrap">
          <div className="table-header">
            <span onClick={()=>setSortBy('name')}>기업명 {sortBy==='name'&&'↑'}</span>
            <span>태그</span>
            <span onClick={()=>setSortBy('revenue')}>매출 {sortBy==='revenue'&&'↓'}</span>
            <span>영업이익</span>
            <span onClick={()=>setSortBy('valuation')}>기업가치 {sortBy==='valuation'&&'↓'}</span>
            <span>M&A 현황</span>
            <span></span>
          </div>
          {filtered.length === 0 ? (
            <div className="empty-state"><div className="empty-icon">🔍</div><div>검색 결과가 없습니다</div></div>
          ) : filtered.map(company => {
            const f = financials[company.id];
            const fp = financials[company.id+'_prev'];
            const v = valuations[company.id];
            const revChange = f && fp ? calcChange(f.revenue, fp.revenue) : null;
            return (
              <div key={company.id} className="table-row" onClick={()=>onSelect(company)}>
                <div>
                  <div className="company-name">{company.name}</div>
                  <div className="company-industry">{company.industry}</div>
                </div>
                <div className="tags-wrap">
                  {(company.tags||[]).slice(0,3).map(t=><span key={t} className="tag">{t}</span>)}
                  {(company.tags||[]).length > 3 && <span className="tag">+{(company.tags||[]).length-3}</span>}
                </div>
                <div>
                  <div className="mono">{fmt(f?.revenue)}</div>
                  {revChange && <div className={`change ${Number(revChange)>=0?'up':'down'}`} style={{fontSize:11}}>{Number(revChange)>=0?'↑':'↓'}{Math.abs(revChange)}%</div>}
                </div>
                <div className={`mono ${f?.operating_profit>=0?'':'down'}`} style={{color:f?.operating_profit==null?'var(--text3)':f.operating_profit>=0?'var(--green)':'var(--red)'}}>
                  {fmt(f?.operating_profit)}
                </div>
                <div className="mono">{fmt(v?.valuation)}</div>
                <div>{getStatusBadge(company.ma_status)}</div>
                <div style={{color:'var(--text3)',fontSize:18}}>›</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────
function App() {
  const [selected, setSelected] = useState(null);
  return (
    <div className="app">
      <header className="header">
        <div className="header-logo">
          <span>●</span> Longlist <span style={{color:'var(--text3)',fontWeight:400}}>Platform</span>
        </div>
        <div style={{fontSize:12,color:'var(--text3)',fontFamily:'DM Mono,monospace'}}>
          {new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}
        </div>
      </header>
      <main className="main">
        {selected ? (
          <DetailView company={selected} onBack={()=>setSelected(null)}/>
        ) : (
          <ListView onSelect={setSelected}/>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
